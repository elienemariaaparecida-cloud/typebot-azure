# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy Typebot infrastructure to Azure Web App - producao-brasil-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout
      id-token: write # This is required for azure/login

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_EA4BA96A9E874E00BDB8BDE00A7CB1C8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_79BDFAB699FF4FC79033C1242573F3DC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B895FB53765E47FC871B1812985E99C6 }}

      - name: Deploy Docker Compose to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'producao-brasil-app'
          slot-name: 'Production'
          package: .
          